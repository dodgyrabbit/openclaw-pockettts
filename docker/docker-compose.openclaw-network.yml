services:
  pockettts:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: openclaw-pockettts:${POCKETTTS_TAG:-local}
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 256
    volumes:
      - pockettts_hf_cache:/models/huggingface
      - pockettts_xdg_cache:/models/.cache
      - pockettts_voices:/models/voices
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)"]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 180s
    networks:
      openclaw_net:
        aliases:
          - pockettts

networks:
  openclaw_net:
    external: true
    name: ${OPENCLAW_NETWORK:-openclaw_default}

volumes:
  pockettts_hf_cache:
  pockettts_xdg_cache:
  pockettts_voices:
