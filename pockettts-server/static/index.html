<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>PocketTTS · OpenAI Speech Demo</title>
  <style>
    :root {
      --bg: #0b1020;
      --card: #11182d;
      --muted: #9fb0d1;
      --text: #e8eeff;
      --accent: #7aa2ff;
      --accent2: #62d2c0;
      --border: #23314f;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: var(--text);
      background: radial-gradient(1200px 700px at 20% -10%, #162449 0%, transparent 45%),
                  radial-gradient(900px 600px at 100% 0%, #15352f 0%, transparent 40%),
                  var(--bg);
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .card {
      width: min(760px, 100%);
      background: linear-gradient(180deg, #131d35 0%, var(--card) 100%);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 22px;
      box-shadow: 0 18px 56px rgba(0,0,0,0.35);
    }
    h1 { margin: 0 0 8px; font-size: 1.2rem; }
    .sub { color: var(--muted); font-size: .95rem; margin-bottom: 18px; }
    .grid {
      display: grid;
      grid-template-columns: 1fr 180px 160px;
      gap: 12px;
    }
    label { font-size: .82rem; color: var(--muted); display:block; margin-bottom:6px; }
    textarea, input, select {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #0d1427;
      color: var(--text);
      padding: 10px 12px;
      font: inherit;
    }
    textarea { min-height: 130px; resize: vertical; }
    .actions { margin-top: 14px; display: flex; gap: 10px; align-items: center; }
    button {
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #081126;
      font-weight: 700;
      padding: 10px 16px;
      cursor: pointer;
    }
    button[disabled] { opacity: .55; cursor: not-allowed; }
    .status { color: var(--muted); font-size: .9rem; }
    .player {
      margin-top: 14px;
      border: 1px dashed var(--border);
      border-radius: 10px;
      padding: 10px;
    }
    audio { width: 100%; }
    @media (max-width: 720px){
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>PocketTTS OpenAI Speech Demo</h1>
    <div class="sub">Calls <code>POST /v1/audio/speech</code> with a minimal OpenAI-compatible payload.</div>

    <label for="text">Text</label>
    <textarea id="text">Hello! This is PocketTTS speaking through an OpenAI-compatible endpoint.</textarea>

    <div class="grid" style="margin-top:12px;">
      <div>
        <label for="voice">Voice name</label>
        <input id="voice" value="alba" />
      </div>
      <div>
        <label for="format">Response format</label>
        <select id="format">
          <option value="wav" selected>wav</option>
          <option value="pcm">pcm</option>
        </select>
      </div>
      <div>
        <label>&nbsp;</label>
        <button id="speak">Generate audio</button>
      </div>
    </div>

    <div class="actions">
      <span id="status" class="status">Idle</span>
    </div>

    <div class="player">
      <audio id="player" controls></audio>
    </div>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);
    const speakBtn = $("speak");
    const statusEl = $("status");
    const player = $("player");

    async function synthesize() {
      const text = $("text").value.trim();
      const voice = $("voice").value.trim() || "alba";
      const responseFormat = $("format").value;

      if (!text) {
        statusEl.textContent = "Please enter some text.";
        return;
      }

      speakBtn.disabled = true;
      statusEl.textContent = "Generating...";

      try {
        const res = await fetch("/v1/audio/speech", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            model: "gpt-4o-mini-tts",
            input: text,
            voice,
            response_format: responseFormat,
            stream_format: "audio"
          })
        });

        if (!res.ok) {
          const msg = await res.text();
          throw new Error(msg || `HTTP ${res.status}`);
        }

        const blob = await res.blob();
        const type = responseFormat === "pcm" ? "audio/L16" : "audio/wav";
        const url = URL.createObjectURL(new Blob([blob], { type }));
        player.src = url;
        statusEl.textContent = `Done (${Math.round(blob.size / 1024)} KB)`;
      } catch (err) {
        statusEl.textContent = `Error: ${err.message || err}`;
      } finally {
        speakBtn.disabled = false;
      }
    }

    speakBtn.addEventListener("click", synthesize);
  </script>
</body>
</html>
